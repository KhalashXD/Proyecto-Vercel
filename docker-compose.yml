version: '3.9'

services:
  # ============================================================
  # PostgreSQL Database
  # ============================================================

  database:
    image: mariadb:11
    container_name: emergency_db

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: emergency_management
      MYSQL_USER: emergencyuser
      MYSQL_PASSWORD: emergencypass

    ports:
      - "3306:3306"

    volumes:
      - mariadb_data:/var/lib/mysql
      #- ./database/schema:/docker-entrypoint-initdb.d
      - ./back/Esquema.sql:/docker-entrypoint-initdb.d/Esquema.sql

    networks:
      - emergency_network
    healthcheck:
        test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
        interval: 10s
        timeout: 5s
        retries: 5

    restart: unless-stopped


# ============================================================
# Backend - FastAPI
# ============================================================
  backend:
    build:
      context: ./back
      dockerfile: backend.Dockerfile

    container_name: emergency_backend

    environment:
      DATABASE_URL: mysql+pymysql://emergencyuser:emergencypass@database:3306/emergency_management
      #GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-change-in-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

    ports:
        - "${BACKEND_PORT:-5000}:8000"

    #volumes: borrar esta seccion despues si es q no tira error
      #- ./back/src:/app/src
      #- ./back/logs:/app/logs
    volumes:
      - ./back:/app
      - ./back/logs:/app/logs

    depends_on:
      database:
        condition: service_healthy

    networks:
      - emergency_network

    restart: unless-stopped

    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload

  # ============================================================
  # Frontend - React + Vite
  # ============================================================
  frontend:
    build:
      context: ./front
      dockerfile: frontend.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
        VITE_GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
    container_name: emergency_frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
      VITE_GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - emergency_network
    restart: unless-stopped

  # ============================================================
  # Redis - Cache y Session Management (Opcional)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: emergency_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - emergency_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: redis-server --appendonly yes

# ============================================================
# Volúmenes Persistentes
# ============================================================
volumes:
  mariadb_data:
    driver: local

  redis_data:
    driver: local

  node_modules:
    driver: local

# ============================================================
# Redes
# ============================================================
networks:
  emergency_network:
    driver: bridge
